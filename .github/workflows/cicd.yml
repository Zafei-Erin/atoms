name: CI/CD

on:
  push:
    branches:
      - main
      - fix-cicd

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend lint
        run: pnpm --filter frontend lint

      - name: Frontend type-check & build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || vars.BETTER_AUTH_URL || 'http://localhost:3000' }}
          VITE_APP_URL: ${{ vars.VITE_APP_URL || vars.APP_URL || 'http://localhost' }}
        run: pnpm --filter frontend build

      - name: Backend type-check & build
        run: pnpm --filter backend build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/atoms
            git pull origin fix-cicd
            docker compose up --build -d
            docker compose ps
